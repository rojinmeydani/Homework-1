<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORFX — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="auth-container">

    <div class="auth-logo">
      <div class="logo-mark">
        <div class="logo-icon">📈</div>
        <span class="logo-text">FORFX</span>
      </div>
      <div class="logo-sub">Prop Trading · Marketing Suite</div>
    </div>

    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your marketing dashboard</p>

      <div class="error-msg" id="errorMsg">⚠ Invalid email or password. Please try again.</div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@forfx.com"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          Sign In →
        </button>

      </form>

      <div class="divider"><span>or</span></div>

      <div class="auth-footer">
        Don't have an account?
        <a href="signup.html">Create one →</a>
      </div>
    </div>

    <div style="text-align:center; margin-top:16px; font-size:12px; color:var(--text-muted);">
      Demo: use any email &amp; password you registered with, or register first.
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
